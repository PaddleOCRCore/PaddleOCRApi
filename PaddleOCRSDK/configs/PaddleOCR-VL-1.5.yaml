pipeline_name: PaddleOCR-VL-1.5 # 流水线名称（当前 DLL 不使用）
batch_size: 64 # 文档级批处理大小（当前 DLL 不使用）
use_queues: true # 是否启用流水线队列并行（当前 DLL 不使用）

# 顶层设备开关：对子模块统一生效
use_gpu: true # 是否使用 GPU

# 流水线功能开关
use_doc_preprocessor: false # 是否启用文档预处理子流水线（方向分类+去畸变）总开关，仅 DocAnalyser 路径生效
use_layout_detection: true # 是否启用版面检测
use_seal_recognition: false # 是否启用印章识别
use_ocr_for_image_block: false # 是否对 image 类块执行 OCR
output_markdown: true # 是否在版面识别返回的JSON中附带markdown字段
format_block_content: false # 是否格式化块内容
visualize: true # 是否对结果进行可视化
enable_log: true # 是否启用日志（true：调试信息输出到控制台+Log目录日志文件；false：仅警告/错误输出到控制台）

# Markdown 输出中要忽略的版面标签
markdown_ignore_labels:
  - number
  - footnote
  - header
  - header_image
  - footer
  - footer_image
  - aside_text

SubModules:
  LayoutDetection:
    module_name: layout_detection # 子模块类型（当前 DLL 不使用该字段）
    model_name: PP-DocLayoutV2 # 模型名（当前 DLL 不使用该字段）
    model_dir: models/PP-DocLayoutV2_infer # 版面检测模型目录
    batch_size: 8 # 子模块批大小（当前 DLL 不使用）
    threshold: 0.3 # 检测阈值
    layout_nms: true # 是否开启同类框 NMS
    layout_shape_mode: auto # 坐标形态模式（auto/rect/quad/poly）
    use_textline_orientation: true # Spotting 为空时启用180度兜底重试，类似PaddleOCR角度分类兜底语义
    text_det_limit_side_len: 960 # Spotting 前长边限制，过大图像按比例缩放到该上限
    merge_layout_blocks: true # 是否启用版面块合并后处理
    sort_layout_elements: false # 版面识别后按阅读顺序排序（从上到下、从左到右，基于行重叠聚类）
    sort_col_tol: 10.0 # 中间步骤排序时判断"同行"的 Y 轴容差（像素），仅影响 merge/filter 步骤；最终阅读顺序排序使用重叠聚类
    layout_unclip_ratio: [1.0, 1.0] # 检测框扩张比例 [x, y]
    layout_merge_bboxes_mode: # 各类框合并策略（union / large）
      0: "union" # abstract
      1: "union" # algorithm
      2: "union" # aside_text
      3: "large" # chart
      4: "union" # content
      5: "large" # display_formula
      6: "large" # doc_title
      7: "union" # figure_title
      8: "union" # footer
      9: "union" # footer_image
      10: "union" # footnote
      11: "union" # formula_number
      12: "union" # header
      13: "union" # header_image
      14: "union" # image
      15: "large" # inline_formula
      16: "union" # number
      17: "large" # paragraph_title
      18: "union" # reference
      19: "union" # reference_content
      20: "union" # seal
      21: "union" # table
      22: "union" # text
      23: "union" # vertical_text
      24: "union" # vision_footnote

  VLRecognition:
    module_name: vl_recognition # 子模块类型（当前 DLL 不使用该字段）
    model_name: PaddleOCR-VL-1.5-GGUF # VL 模型名（当前 DLL 不使用该字段）
    model_dir: models/PaddleOCR-VL-1.5-GGUF.gguf # VL 主模型路径（GGUF 格式）
    mmproj_path: models/PaddleOCR-VL-1.5-GGUF-mmproj.gguf # VL 视觉投影模型路径（GGUF 格式）
    batch_size: -1 # 子模块批大小（当前 DLL 不使用）
    prompts: # 各类型区块的识别提示词（PaddleX 标准 YAML 中内置，此处可自定义覆盖）
      text_prompt: "OCR:" # 普通文本识别提示词
      table_prompt: "Table Recognition:" # 表格识别提示词
      figure_prompt: "Chart Recognition:" # 图表识别提示词
      seal_prompt: "Seal Recognition:" # 印章识别提示词
      formula_prompt: "Formula Recognition:" # 公式识别提示词
    genai_config:
      n_ctx: 81920 # 上下文长度
      n_batch: 4096 # 推理 batch token 大小
      n_predict: 16384 # 最大生成 token 数（大表格需要更多 token）
      top_k: 40 # top-k 采样
      top_p: 0.95 # top-p 采样
      temp: 0.0 # 温度参数
      repetition_penalty: 1.05 # 重复惩罚
      min_pixels: 112896 # 最小像素约束（来自模型元数据 clip.vision.image_min_pixels，336×336）
      max_pixels: 1003520 # 最大像素约束（来自模型元数据 clip.vision.image_max_pixels，28×28×1280）
      seed: 42 # 随机种子
      media_marker: "<__media__>" # 多模态输入占位符，Init（VL 引擎）和 InitDoc（DocAnalyser）路径均读取
      verbose: false # 是否输出详细日志

SubPipelines:
  DocPreprocessor:
    pipeline_name: doc_preprocessor # 子流水线名称（当前 DLL 不使用该字段）
    batch_size: 8 # 子流水线批大小（当前 DLL 不使用）
    use_doc_orientation_classify: true # 是否启用方向分类（仅 DocAnalyser 路径读取）
    use_doc_unwarping: false # 是否启用去畸变（仅 DocAnalyser 路径读取）
    SubModules:
      DocOrientationClassify:
        module_name: doc_text_orientation # 子模块类型（当前 DLL 不使用该字段）
        model_name: PP-LCNet_x1_0_doc_ori # 模型名（当前 DLL 不使用该字段）
        model_dir: models/PP-LCNet_x1_0_doc_ori_infer # 方向分类模型目录
        batch_size: 8 # 子模块批大小（当前 DLL 不使用）
      DocUnwarping:
        module_name: image_unwarping # 子模块类型（当前 DLL 不使用该字段）
        model_name: UVDoc # 模型名（当前 DLL 不使用该字段）
        model_dir: models/UVDoc_infer # 去畸变模型目录


